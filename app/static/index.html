<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <main>
    <div class="form-section">
    <header>
      <h1>🔗 URL Shortener</h1>
      <p>Paste a long URL and get a short, shareable link instantly.</p>
    </header>

    <!-- Form card -->
    <div class="card">
      <form id="shorten-form" autocomplete="off">
        <div class="form-group">
          <label for="url-input">Long URL</label>
          <input type="url" id="url-input" placeholder="https://example.com/your/very/long/url" required>
        </div>
        <div class="form-group">
          <label for="expiry-input">
            Expiry date <span class="optional">(optional)</span>
          </label>
          <input type="datetime-local" id="expiry-input">
        </div>
        <button class="btn-primary" id="shorten-btn">Shorten URL</button>
      </form>
    </div>
    </div><!-- /.form-section -->

    <!-- Template for a result card (cloned per new link) -->
    <template id="result-card-tpl">
      <div class="card" aria-live="polite">
        <div class="result-label">Your short link</div>
        <div class="short-url-row">
          <a class="short-url-link" href="" target="_blank" rel="noopener"></a>
          <button class="btn-copy">Copy</button>
        </div>
        <div class="stats-row">
          <div class="stat">
            <div class="stat-value stat-clicks">—</div>
            <div class="stat-label">Clicks</div>
          </div>
          <div class="stat">
            <div class="stat-value stat-created">—</div>
            <div class="stat-label">Created</div>
          </div>
          <div class="stat">
            <div class="stat-value stat-expires">—</div>
            <div class="stat-label">Expires</div>
          </div>
        </div>
        <div class="result-footer">
          <span class="meta-text original-url-preview"></span>
          <div class="result-actions">
            <button class="btn-refresh">Refresh</button>
            <button class="btn-delete">Delete this link</button>
          </div>
        </div>
      </div>
    </template>

    <!-- Result cards (dynamically added) -->
    <div id="results-container"></div>

    <!-- Error toast -->
    <div class="toast hidden" id="error-toast" role="alert"></div>
  </main>

  <script src="/static/script.js"></script>
</body>

</html>
