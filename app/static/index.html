<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <main>
    <header>
      <h1>🔗 URL Shortener</h1>
      <p>Paste a long URL and get a short, shareable link instantly.</p>
    </header>

    <!-- Form card -->
    <div class="card">
      <form id="shorten-form" autocomplete="off">
        <div class="form-group">
          <label for="url-input">Long URL</label>
          <input type="url" id="url-input" placeholder="https://example.com/your/very/long/url" required>
        </div>
        <div class="form-group">
          <label for="expiry-input">
            Expiry date <span class="optional">(optional)</span>
          </label>
          <input type="datetime-local" id="expiry-input">
        </div>
        <button class="btn-primary" id="shorten-btn">Shorten URL</button>
      </form>
    </div>

    <!-- Result card (hidden until a link is created) -->
    <div class="card hidden" id="result-card" aria-live="polite">
      <div class="result-label">Your short link</div>
      <div class="short-url-row">
        <a id="short-url-link" href="" target="_blank" rel="noopener"></a>
        <button class="btn-copy" id="copy-btn">Copy</button>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-value" id="stat-clicks">—</div>
          <div class="stat-label">Clicks</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-created">—</div>
          <div class="stat-label">Created</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-expires">—</div>
          <div class="stat-label">Expires</div>
        </div>
      </div>
      <div class="result-footer">
        <span class="meta-text" id="original-url-preview"></span>
        <button class="btn-delete" id="delete-btn">Delete this link</button>
      </div>
    </div>

    <!-- Error toast -->
    <div class="toast hidden" id="error-toast" role="alert"></div>
  </main>

  <script src="/static/script.js"></script>
</body>

</html>
