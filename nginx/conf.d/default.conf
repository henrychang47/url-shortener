upstream api {
    server api-1:8000;
    server api-2:8000;
}

server {
    listen 80;

    location = /health {
        access_log off;
        return 200 "healthy\n";
    }

    location = /api-1-health {
        proxy_pass http://api-1:8000/health;
        access_log off;
    }

    location = /api-2-health {
        proxy_pass http://api-2:8000/health;
        access_log off;
    }

    location /url-shortener/ {
        proxy_pass http://api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}