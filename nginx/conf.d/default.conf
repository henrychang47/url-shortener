server {
    listen 80;
    root /usr/share/nginx/html;

    location = /health {
        access_log off;
        return 200 "healthy\n";
    }

    location = /backend-health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    location = /url-shortener {
        return 301 /url-shortener/;
    }

    location ^~ /url-shortener/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /url-shortener/r/ {
        proxy_pass http://backend:8000/r/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /url-shortener/docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /url-shortener/openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /url-shortener/ {
        try_files $uri $uri/ /url-shortener/index.html;
    }

    location / {
        return 302 /url-shortener/;
    }
}
