name: CI

permissions:
  contents: read
  packages: write
  id-token: write

env:
  AWS_REGION: ap-southeast-2
  GHCR_IMAGE: ghcr.io/henrychang47/url-shortener

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-type-check:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Check python version
        run: python --version

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Alembic migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379 # not used, but required by the fastapi configuration

      - name: Check no pending migrations
        run: uv run alembic check
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379 # not used, but required by the fastapi configuration

      - name: Run pytest
        run: uv run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379 # not used, but required by the fastapi configuration

  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
            ${{ env.GHCR_IMAGE }}:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME != '' && vars.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_TO_ASSUME }}

      - name: Resolve deployment target
        id: resolve-instance
        shell: bash
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters "Name=tag:App,Values=url-shortener" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          COUNT=$(wc -w <<< "$INSTANCE_IDS")
          if [ "$COUNT" -ne 1 ]; then
            echo "Expected exactly one running instance tagged App=url-shortener, found: $COUNT"
            echo "Resolved instance ids: $INSTANCE_IDS"
            exit 1
          fi

          echo "instance_id=$INSTANCE_IDS" >> "$GITHUB_OUTPUT"

      - name: Build SSM payload
        run: |
          python3 .github/scripts/build_ssm_payload.py \
            --image "${GHCR_IMAGE}:${GITHUB_SHA}" \
            --output ssm-parameters.json \
            --compose-prod compose.prod.yaml \
            --nginx-conf nginx/conf.d/default.conf

      - name: Deploy through SSM
        env:
          INSTANCE_ID: ${{ steps.resolve-instance.outputs.instance_id }}
        shell: bash
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA}" \
            --parameters file://ssm-parameters.json \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          STDOUT=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text)

          STDERR=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text)

          printf '%s\n' "$STDOUT"
          if [ "$STDERR" != "None" ]; then
            printf '%s\n' "$STDERR" >&2
          fi

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command failed with status: $STATUS" >&2
            exit 1
          fi
