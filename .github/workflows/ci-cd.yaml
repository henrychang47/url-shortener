name: CICD

permissions:
  contents: read

env:
  AWS_REGION: ap-east-2
  GHCR_BACKEND_IMAGE: ghcr.io/henrychang47/url-shortener/backend
  GHCR_FRONTEND_IMAGE: ghcr.io/henrychang47/url-shortener/frontend

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint-and-type-check:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Check python version
        run: python --version

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Ruff lint check
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: Mypy type check
        working-directory: backend
        run: uv run mypy .

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint and type check
        working-directory: frontend
        run: npm run lint

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Run Alembic migrations
        working-directory: backend
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379 # not used, but required by the fastapi configuration

      - name: Check no pending migrations
        working-directory: backend
        run: uv run alembic check
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379 # not used, but required by the fastapi configuration

      - name: Run pytest
        working-directory: backend
        run: uv run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379 # not used, but required by the fastapi configuration

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.GHCR_BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.GHCR_BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.GHCR_FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.GHCR_FRONTEND_IMAGE }}:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME != '' && vars.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_TO_ASSUME }}

      - name: Resolve deployment target
        id: resolve-instance
        shell: bash
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters "Name=tag:App,Values=url-shortener" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          COUNT=$(wc -w <<< "$INSTANCE_IDS")
          if [ "$COUNT" -ne 1 ]; then
            echo "Expected exactly one running instance tagged App=url-shortener, found: $COUNT"
            echo "Resolved instance ids: $INSTANCE_IDS"
            exit 1
          fi

          echo "instance_id=$INSTANCE_IDS" >> "$GITHUB_OUTPUT"

      - name: Build SSM payload
        run: |
          python3 .github/scripts/build_ssm_payload.py \
            --backend-image "${GHCR_BACKEND_IMAGE}:${GITHUB_SHA}" \
            --frontend-image "${GHCR_FRONTEND_IMAGE}:${GITHUB_SHA}" \
            --output ssm-parameters.json \
            --compose-prod compose.prod.yaml \
            --nginx-conf nginx/conf.d/default.conf

      - name: Deploy through SSM
        env:
          INSTANCE_ID: ${{ steps.resolve-instance.outputs.instance_id }}
        shell: bash
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA}" \
            --parameters file://ssm-parameters.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command id: $COMMAND_ID"

          STATUS="Pending"
          for _ in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)

            echo "Current SSM status: $STATUS"

            case "$STATUS" in
              Success|Cancelled|Cancelling|TimedOut|Failed)
                break
                ;;
            esac

            sleep 10
          done

          STATUS_DETAILS=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StatusDetails" \
            --output text)

          RESPONSE_CODE=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "ResponseCode" \
            --output text)

          STDOUT=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text)

          STDERR=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text)

          printf '%s\n' "$STDOUT"
          if [ "$STDERR" != "None" ]; then
            printf '%s\n' "$STDERR" >&2
          fi

          echo "Final SSM status: $STATUS"
          echo "Final SSM status details: $STATUS_DETAILS"
          echo "Final SSM response code: $RESPONSE_CODE"

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command failed with status: $STATUS" >&2
            exit 1
          fi
